name: CI/CD Pipeline - Maverick Bank

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build and Run Unit Tests
        run: mvn clean test -pl . -Dtest="com.example.demo.service.*Test" -DfailIfNoTests=false
      - name: Package Application
        run: mvn package -DskipTests

  docker-build-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/maverick-backend:latest
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./react/maverick-bank-frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/maverick-frontend:latest

  deploy-to-aws:
    needs: docker-build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/maverick-bank/"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Install Docker Compose if missing
            sudo apt-get update && sudo apt-get install -y docker-compose-plugin
            
            cd ~/maverick-bank
            
            # 2. Update the docker-compose file for Production
            # Replace local DB host with AWS RDS Endpoint
            sed -i "s|host.docker.internal|maverick-db.czkko6sw2azu.eu-north-1.rds.amazonaws.com|g" docker-compose.yml
            
            # Replace build instructions with the Docker Hub images
            # This is critical because the server doesn't have the source code folders
            sed -i "s|build:|image: ${{ secrets.DOCKERHUB_USERNAME }}/maverick-backend:latest\n    # build:|g" docker-compose.yml
            # We also need to fix the second 'build:' for the frontend
            sed -i "0,/build:/! s|build:|image: ${{ secrets.DOCKERHUB_USERNAME }}/maverick-frontend:latest\n    # build:| " docker-compose.yml
            
            # 3. Pull and Run
            sudo docker compose pull
            sudo docker compose up -d
            sudo docker image prune -f
