name: CI/CD Pipeline - Maverick Bank

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build and Run Unit Tests
        run: mvn clean test -pl . -Dtest="com.example.demo.service.*Test" -DfailIfNoTests=false
      - name: Package Application
        run: mvn package -DskipTests

  docker-build-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/maverick-backend:latest
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./react/maverick-bank-frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/maverick-frontend:latest

  deploy-to-aws:
    needs: docker-build-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/maverick-bank
            cat <<EOF > ~/maverick-bank/docker-compose.yml
            services:
              backend:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/maverick-backend:latest
                container_name: maverick-backend
                ports:
                  - "5000:5000"
                environment:
                  - DB_HOST=maverick-db.czkko6sw2azu.eu-north-1.rds.amazonaws.com
                  - DB_USER=admin
                  - DB_PASS=SivaBank2026
                  - EUREKA_CLIENT_ENABLED=false
              frontend:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/maverick-frontend:latest
                container_name: maverick-frontend
                ports:
                  - "3000:3000"
                depends_on:
                  - backend
            EOF
            cd ~/maverick-bank
            sudo docker compose pull
            sudo docker compose up -d --force-recreate
            sudo docker image prune -f
